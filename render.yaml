services:
  - type: mysql
    name: gps-db
    ipAllowList: []  # Add your IP or leave empty for Render's default
    initSql: init.sql

  - type: web
    name: gps-backend
    env: docker
    dockerfilePath: ./php server/Dockerfile
    healthCheckPath: /api.php
    envVars:
      - key: PORT
        value: "10000"

  - type: web
    name: gps-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "10000"mand: npm run preview -- --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "10000"
      - key: VITE_API_URL
        value: https://gps-backend.onrender.com/api.php  # Update with actual URL